name: Promote release
run-name: ${{ github.workflow }} (`${{ inputs.VERSION }}`@${{ inputs.ENVIRONMENT }})

on:
  # Called from release orchestrator
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'The version to promote (e.g. `5.4.1`)'
        required: true
      RELEASE_TYPE:
        description: 'What should be promoted'
        required: true
        type: choice
        options:
          - ALL
          - OSS
          - EE
      ENVIRONMENT:
        description: 'Environment to use'
        required: true
        type: environment
      distinct_id:
        description: 'Required exclusively for automated execution to track status of workflow execution'
        required: false

jobs:
  prepare:
    # we need to use GH runners for now as there's a GH issue with triggering jobs on ubicloud in a private sandbox fork ff
    runs-on: ubuntu-slim
    steps:
        # https://github.com
      - name: Logging distinct ID (${{ inputs.distinct_id }})
        run: echo "${DISTINCT_ID}"
        env:
          DISTINCT_ID: ${{ inputs.distinct_id }}

  promote:
    # we need to use GH runners for now as there's a GH issue with triggering jobs on ubicloud in a private sandbox fork
    runs-on: ${{ github.event.repository.fork && 'ubuntu-latest' || 'ubicloud-standard-2' }}
    needs: prepare
    permissions:
      contents: write
      pull-requests: write
    env:
      RELEASE_VERSION: ${{ inputs.VERSION }}
    steps:
      - name: Checkout `release` branch
        uses: actions/checkout@v7
        with:
          path: ${{ env.RELEASE_VERSION }}

      - name: Checkout `main` automation scripts
        uses: actions/checkout@v7
        with:
          path: src-scripts

      - name: Get Mono version info
        id: get-mono-version-info
        uses: hazelcast/mono-actions/get-version-info@DI-719-migrate-antora-1
        with:
          release-version: ${{ env.RELEASE_VERSION }}
          github-token: ${{ secrets.GH_TOKEN }}
          skip-set-mc-version: true

      - name: Install ruamel.yaml
        run: python3 -m pip install ruamel.yaml

      - name: Configure Git Identity
        working-directory: ${{ env.RELEASE_VERSION }}
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Merge Antora Pull Requests
        working-directory: ${{ env.RELEASE_VERSION }}
        shell: python
        run: |
          from os import getenv
          import antora_updater as updater

          updater.promote_pull_requests(
              is_beta_release=getenv("IS_BETA_RELEASE"),
              is_rel_major_minor=getenv("IS_REL_MAJOR_MINOR"),
              release_version=getenv("RELEASE_VERSION"),
              master_version=getenv("MASTER_VERSION"),
              rel_major_minor=getenv("REL_MAJOR_MINOR")
          )
        env:
          IS_REL_MAJOR_MINOR: ${{ steps.get-mono-version-info.outputs.is-rel-major-minor }}
          IS_BETA_RELEASE: ${{ steps.get-mono-version-info.outputs.is-beta-release }}
          MASTER_VERSION: ${{ steps.get-mono-version-info.outputs.master-version }}
          REL_MAJOR_MINOR: ${{ steps.get-mono-version-info.outputs.rel-major-minor }}
          PYTHONPATH: ${{ github.workspace }}/src-scripts/.github/scripts
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Create v/branch from release branch
        if: ${{ steps.get-mono-version-info.outputs.is-rel-major-minor == 'true' }}
        shell: python
        working-directory: ${{ env.RELEASE_VERSION }}
        run: |
          from os import getenv
          import antora_utils as utils

          rel_major_minor = getenv("REL_MAJOR_MINOR")
          release_version = getenv("RELEASE_VERSION")
          v_branch_name = f"v/{rel_major_minor}"

          if getenv("IS_BETA_RELEASE") == "true":
              beta_number = release_version.split("-BETA-")[1]
              v_branch_name = f"v/{rel_major_minor}-BETA-{beta_number}"

          utils.git_checkout_remote(v_branch_name, release_version)
          utils.git_push_remote(v_branch_name)
        env:
          REL_MAJOR_MINOR: ${{ steps.get-mono-version-info.outputs.rel-major-minor }}
          IS_BETA_RELEASE: ${{ steps.get-mono-version-info.outputs.is-beta-release }}
          PYTHONPATH: ${{ github.workspace }}/src-scripts/.github/scripts
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
