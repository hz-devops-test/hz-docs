name: Package release
run-name: ${{ github.workflow }} (`${{ inputs.VERSION }}`@${{ inputs.ENVIRONMENT }})

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'The version to build (e.g. `5.4.1`)'
        required: true
      RELEASE_TYPE:
        description: 'What should be built'
        required: true
        type: choice
        options:
          - ALL
          - OSS
          - EE
      ENVIRONMENT:
        description: 'Environment to use'
        required: true
        type: environment
      distinct_id:
        description: 'Required exclusively for automated execution to track status of workflow execution'
        required: false
jobs:
  prepare:
    runs-on: ubuntu-slim
    steps:
      - name: Logging distinct ID (${{ inputs.distinct_id }})
        run: echo "${DISTINCT_ID}"
        env:
          DISTINCT_ID: ${{ inputs.distinct_id }}

  package:
    runs-on: ${{ github.event.repository.fork && 'ubuntu-latest' || 'ubicloud-standard-2' }}
    needs: prepare
    environment:
      name: ${{ inputs.ENVIRONMENT }}
      deployment: false
    permissions:
      id-token: write
      contents: write
    env:
      RELEASE_VERSION: ${{ inputs.VERSION }}
    steps:
      - name: Checkout `release` branch
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_VERSION }}
          path: ${{ env.RELEASE_VERSION }}

      - name: Checkout `main` automation scripts
        uses: actions/checkout@v7
        with:
          path: src-scripts

      - name: Get Mono version info
        id: get-mono-info
        uses: hazelcast/mono-actions/get-version-info@DI-719-migrate-antora-1
        with:
          release-version: ${{ env.RELEASE_VERSION }}
          github-token: ${{ secrets.GH_TOKEN }}
          jfrog-files-repo: ${{ vars.JFROG_PREPROD_FILES_REPO }}
          skip-set-mc-version: true
          aws-role-to-assume: ${{ vars.AWS_HAZELCAST_OIDC_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Install ruamel.yaml
        run: python3 -m pip install ruamel.yaml --break-system-packages

      - name: Configure git
        working-directory: ${{ env.RELEASE_VERSION }}
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Update antora.yml
        shell: python
        working-directory: ${{ env.RELEASE_VERSION }}
        run: |
          from os import getenv
          import antora_updater as antora

          antora.update(
              release_ver=getenv("RELEASE_VERSION"),
              rel_major_minor=getenv("REL_MAJOR_MINOR"),
              master_version=getenv("MASTER_VERSION"),
              master_major_minor=getenv("MASTER_MAJOR_MINOR"),
              is_latest_stable_release=getenv("IS_LATEST_STABLE_RELEASE"),
              is_beta_release=getenv("IS_BETA_RELEASE"),
              is_rel_major_minor=getenv("IS_REL_MAJOR_MINOR")
          )
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          REL_MAJOR_MINOR: ${{ steps.get-mono-info.outputs.rel-major-minor }}
          MASTER_VERSION: ${{ steps.get-mono-info.outputs.master-version }}
          MASTER_MAJOR_MINOR: ${{ steps.get-mono-info.outputs.master-major-minor }}
          IS_LATEST_STABLE_RELEASE: ${{ steps.get-mono-info.outputs.is-latest-stable-release }}
          IS_BETA_RELEASE: ${{ steps.get-mono-info.outputs.is-beta-release }}
          IS_REL_MAJOR_MINOR: ${{ steps.get-mono-info.outputs.is-rel-major-minor }}
          PYTHONPATH: ${{ github.workspace }}/src-scripts/.github/scripts
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
